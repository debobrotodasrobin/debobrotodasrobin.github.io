---
layout: default
title: Tags
---

<section class="section">
  <h1 class="title">Tags</h1>
  <p class="subtitle">Click a tag to view all posts in that category.</p>
  <div class="tags are-medium">
  {% assign all_tags = site.tags | sort %}
  {% for tag in all_tags %}
    <a class="tag is-link" href="/tag/#{{ tag[0] | slugify }}">{{ tag[0] }} ({{ tag[1].size }})</a>
  {% endfor %}
  </div>
</section>
